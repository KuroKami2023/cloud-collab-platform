<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CloudCollab - Login</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="container">
    <div class="auth-card">
      <div class="auth-header">
        <h1>CloudCollab</h1>
        <p>File sharing & real-time collaboration</p>
      </div>
      <div class="auth-tabs">
        <button class="tab-btn active" data-tab="login">Login</button>
        <button class="tab-btn" data-tab="register">Register</button>
      </div>
      <div id="login-form" class="auth-form active">
        <div class="form-group">
          <label for="login-username">Username</label>
          <input type="text" id="login-username" placeholder="Enter your username" required>
        </div>
        <div class="form-group">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" placeholder="Enter your password" required>
        </div>
        <button id="login-btn" class="btn btn-primary">Login</button>
        <p id="login-error" class="error-message"></p>
      </div>
      <div id="register-form" class="auth-form">
        <div class="form-group">
          <label for="reg-username">Username</label>
          <input type="text" id="reg-username" placeholder="Choose a username (min 3 chars)" required>
        </div>
        <div class="form-group">
          <label for="reg-password">Password</label>
          <input type="password" id="reg-password" placeholder="Choose a password (min 6 chars)" required>
        </div>
        <div class="form-group">
          <label for="reg-confirm">Confirm Password</label>
          <input type="password" id="reg-confirm" placeholder="Confirm your password" required>
        </div>
        <button id="register-btn" class="btn btn-primary">Register</button>
        <p id="register-error" class="error-message"></p>
      </div>
    </div>
  </div>

  <script>
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(btn.dataset.tab + '-form').classList.add('active');
        document.querySelectorAll('.error-message').forEach(e => e.textContent = '');
      });
    });

    document.getElementById('login-btn').addEventListener('click', async () => {
      const username = document.getElementById('login-username').value;
      const password = document.getElementById('login-password').value;
      const errorEl = document.getElementById('login-error');

      try {
        const res = await fetch('/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });
        const data = await res.json();
        if (res.ok) {
          window.location.href = '/dashboard.html';
        } else {
          errorEl.textContent = data.error || 'Login failed';
        }
      } catch (err) {
        errorEl.textContent = 'Network error. Please try again.';
      }
    });

    document.getElementById('register-btn').addEventListener('click', async () => {
      const username = document.getElementById('reg-username').value;
      const password = document.getElementById('reg-password').value;
      const confirm = document.getElementById('reg-confirm').value;
      const errorEl = document.getElementById('register-error');

      if (password !== confirm) {
        errorEl.textContent = 'Passwords do not match';
        return;
      }

      try {
        const res = await fetch('/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });
        const data = await res.json();
        if (res.ok) {
          window.location.href = '/dashboard.html';
        } else {
          errorEl.textContent = data.error || 'Registration failed';
        }
      } catch (err) {
        errorEl.textContent = 'Network error. Please try again.';
      }
    });

    document.querySelectorAll('input').forEach(input => {
      input.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
          if (document.getElementById('login-form').classList.contains('active')) {
            document.getElementById('login-btn').click();
          } else {
            document.getElementById('register-btn').click();
          }
        }
      });
    });
  </script>
</body>
</html>
